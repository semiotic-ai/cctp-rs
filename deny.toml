[graph]
targets = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "ISC",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    "RUSTSEC-2024-0388", # derivative unmaintained (transitive via ark-ff/ruint)
    "RUSTSEC-2024-0436", # paste unmaintained (transitive via alloy-sol-macro)
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
